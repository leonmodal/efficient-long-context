# Phase 3: log-linear growing state (Fenwick). #levels grows ~ log(T/chunk).
d_model: 512
n_layers: 6
n_heads: 8
head_dim: 64
vocab_size: 50304
max_seq_len: 65536
periods: [1, 128]         # seed periods; growth adds levels lazily (Fenwick schedule)
chunk_size: 64
value_source: memory
tie_probe_to_lower_key: false
use_output_gate: true
seed_on_create: true
grow: true
growth_base: 2
detach_value_steps: 2000
alpha_bias_init: 4.0
beta_bias_init: -4.0
