# Phase 1: two-bucket memory flow (fast + one consolidated slow bucket).
d_model: 512
n_layers: 6
n_heads: 8
head_dim: 64
vocab_size: 50304
max_seq_len: 8192
periods: [1, 128]
chunk_size: 64
value_source: memory      # "token" for the multi-rate-token-reading ablation
tie_probe_to_lower_key: false
use_output_gate: true
grow: false
detach_value_steps: 2000
alpha_bias_init: 4.0
beta_bias_init: -4.0
